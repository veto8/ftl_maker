name: Windows

on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: none

env:
   CURL_INCLUDE_DIR: C:\vcpkg\packages\curl_x64-windows\include\curl\
   CURL_LIBRARY: C:\vcpkg\packages\curl_x64-windows\lib\ibcurl.lib
   PKG_CONFIG_PATH: C:\vcpkg\packages\curl_x64-windows\lib\pkgconfig

jobs:
  Build:
    if: github.repository_owner == 'myridia'
    runs-on: windows-latest
    steps:
      - name: MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Dependencies
        run: |
          choco install pkgconfiglite tree -y
          vcpkg install curl

      - name: Check
        run: |
          tree C:\vcpkg\packages

        #  vcpkg install curl
        # echo "CURL_INCLUDE_DIR is: $env:CURL_INCLUDE_DIR"
        # echo "CURL_LIBRARY is: $env:CURL_LIBRARY"
        # echo "PKG_CONFIG_PATH is: $env:PKG_CONFIG_PATH"
        # tree C:\ProgramData\chocolatey\lib\pkgconfiglite
        # pkg-config --modversion curl
          
          
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
           cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
           cmake --build build       
           mv build/ftl_maker ftl_maker_mac 
        

      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'build/ftl_maker.exe'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true  
        


 
     
