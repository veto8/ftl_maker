name: Windows

on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: none


jobs:
  Build:
    if: github.repository_owner == 'myridia'
    runs-on: windows-latest
    steps:
      - name: MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Dependencies
        run: |
          choco install pkgconfiglite tree -y
          vcpkg install curl:x64-windows jansson:x64-windows dirent:x64-windows pthreads:x64-windows

      - name: Check
        run: |
          tree C:\vcpkg\packages

          
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="x64-windows"
          cmake --build build --config Release
          dir build\Release
        

      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'D:\a\ftl_maker\ftl_maker\build\Release\ftl_maker.exe'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true  
        


 
     
